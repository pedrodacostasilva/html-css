<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Aumente e diminua o navegaqdor</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Se liga nesse beat insano!</p>
    <!-- 
    Forma comum(Só um tipo de arquivo)
    <audio src="audio/Japones.mp3" autoplay controls></audio> 
    -->

    <audio preload="metadata" controls loop>
        <source src="audio/Japones.mp3" type="audio/mpeg">
        <source src="audio/Japones.ogg" type="audio/ogg">
        <source src="audio/Japones.wav" type="audio/wav">
    </audio>
    <!-- Pra vídeo é a mesma coisa jjjjj-->
</body>
</html>
